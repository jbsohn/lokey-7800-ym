# Atari 7800 Industrial Linker Configuration
# Expanded RAM areas for SDK and Diagnostics

MEMORY {
    ZP:      start = $0040, size = $00C0, type = rw, define = yes;
    
    # Internal RAM ($1800-$203F) - 2KB
    RAM1:    start = $1800, size = $0840, type = rw, define = yes;
    
    # Internal RAM ($2100-$213F)
    RAM2:    start = $2100, size = $0040, type = rw, define = yes;

    # Internal RAM ($2200-$27FF) - 1.5KB
    RAM3:    start = $2200, size = $0600, type = rw, define = yes;

    # ROM starts at $8000
    ROM:     start = $8000, size = $7FF8, file = %O, fill = yes, fillval = $FF;
    VECTORS: start = $FFF8, size = $0008, file = %O, fill = yes, fillval = $FF;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp,  optional = yes;
    BSS:      load = RAM3, type = bss, optional = yes;
    CODE:     load = ROM,  type = ro,  align = $100;
    RODATA:   load = ROM,  type = ro,  optional = yes;
    VECTORS:  load = VECTORS, type = ro;
}
